<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClaroPaso - Nyx</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="logo">ClaroPaso</div>
            <div class="user-greeting">Hola, amiga</div>
        </header>

        <main class="dashboard-grid">
            <div class="tile hogar"><span>🏠</span> Hogar</div>
            <div class="tile escuela"><span>📚</span> Escuela</div>
            <div class="tile salud"><span>🏥</span> Salud</div>
            <div class="tile vision"><span>👁️</span> Visión</div>
            <div class="tile dental"><span>🦷</span> Dental</div>
            <div class="tile legal"><span>⚖️</span> Legal</div>
        </main>

        <footer class="action-bar">
            <button class="btn-secondary">📅</button>
            <div class="camera-container">
                <button class="btn-camera" title="Escanear papel">
                    📸
                </button>
            </div>
            <button class="btn-secondary">💬</button>
        </footer>
    </div>
</body>
</html>
