<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>ClaroPaso - Nyx</title>
</head>
<body>

<div class="pilar-container">
    <header class="pilar-header">
        <button class="btn-back" onclick="window.history.back()">⬅️ Regresar</button>
        <h2 id="pilar-title">Cargando...</h2> 
    </header>

    <div class="chat-area" id="chat-nyx">
        </div>

    <footer class="nyx-input-bar">
        <div class="input-wrapper">
            <button class="icon-btn" id="camera-btn" title="Subir documento">📷</button>
            
            <input type="file" id="file-input" accept="image/*" style="display: none;">
            
            <input type="text" id="chat-input" placeholder="Pregúntale algo a Nyx...">
            <button class="icon-btn" id="mic-btn" title="Dictar voz">🎙️</button>
        </div>
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
